name: Oracle Cron
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  oracle:
    runs-on: ubuntu-latest
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      ATTESTOR_KEY: ${{ secrets.ATTESTOR_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Oracle Daemon
        run: |
          cd htp-oracle-daemon
          npm install 2>/dev/null || true
          node oracle-daemon-v2.js || true